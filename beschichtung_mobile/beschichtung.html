<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<script>
(function () {
    var BUILD = "besc20";
    if (location.search.indexOf(BUILD) < 0) {
        location.replace(location.pathname + "?" + BUILD + "=" + Date.now());
    }
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#003a73">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Beschichtung</title>
<link rel="stylesheet" href="beschichtung_mobile.css?v=20260704besc19">
</head>
<body data-page="beschichtung" data-ver="besc19">

<div id="deviceInfo" class="device-info"></div>
<p id="buildInfo" class="build-info" x-apple-data-detectors="false"></p>

<div id="card">

    <h1 class="page-title">Beschichtung</h1>
    <p class="page-sub">Warenanhänger · A5</p>

    <div class="content-row">
        <div class="input-block">
            <p class="section-head">Eingabe</p>
            <div class="panel-box">
                <input id="beistellInput" class="input-field" type="text" placeholder="Beistellnummer" readonly>
                <input id="kundeInput" class="input-field" type="text" placeholder="Kundenname (optional)" readonly>
                <button type="button" id="eiltBtn" class="eilt-toggle">Eilt sehr: Aus</button>
            </div>
        </div>

        <div class="select-block">
            <p class="section-head">Beschichter wählen</p>
            <div class="panel-box grid-panel">
                <div class="beschichter-grid">
                    <button type="button" class="kunde-btn" data-type="LP">L&amp;P</button>
                    <button type="button" class="kunde-btn" data-type="SCHUETTE">Schütte</button>
                    <button type="button" class="kunde-btn" data-type="KLEY">Kleymann</button>
                    <button type="button" class="kunde-btn" data-type="WOB">WOB</button>
                    <button type="button" class="kunde-btn" data-type="KALEY">Kaley</button>
                    <button type="button" class="kunde-btn" data-type="COMTEZN8">Comte ZN8</button>
                    <button type="button" class="kunde-btn" data-type="EKODEKOR">EKO-Dekor</button>
                    <button type="button" class="kunde-btn" data-type="COMTEZNI8">Comte ZnI8</button>
                    <button type="button" class="kunde-btn" data-type="CHEMISCH">Comte Chemisch</button>
                    <button type="button" class="kunde-btn" data-type="DICK">Comte Dickschicht</button>
                    <button type="button" class="kunde-btn" data-type="BLAU">Comte Blau</button>
                    <button type="button" class="kunde-btn" data-type="PENTZ">Pentz &amp; Gerdes ZN8</button>
                    <button type="button" class="kunde-btn" data-type="RCS">RCS – Schweißen</button>
                    <button type="button" class="kunde-btn" data-type="COATINC">Coatinc 24 Verzinken</button>
                </div>
            </div>
        </div>
    </div>

    <div id="actionButtons">
        <button type="button" id="backBtn">◀ Zurück</button>
        <button type="button" id="druckenBtn">Drucken</button>
    </div>

</div>

<div id="keyboardPopup" class="keyboard-popup">
    <div class="keyboard-content">
        <div class="keyboard-block">
            <div class="keyboard-header">
                <h3 id="keyboardTitle">Eingabe</h3>
                <button type="button" id="keyboardClose" class="keyboard-close-x" aria-label="Schließen">✕</button>
            </div>

            <input id="keyboardInput"
                   class="keyboard-input"
                   inputmode="none"
                   autocomplete="off"
                   autocorrect="off"
                   autocapitalize="characters"
                   spellcheck="false"
                   readonly>

            <div id="keyboardKeysNum" class="keyboard-keys-wrap">
                <table class="keyboard-grid" role="presentation">
                <tbody>
                    <tr>
                        <td><button type="button" class="kb-key" data-key="1">1</button></td>
                        <td><button type="button" class="kb-key" data-key="2">2</button></td>
                        <td><button type="button" class="kb-key" data-key="3">3</button></td>
                    </tr>
                    <tr>
                        <td><button type="button" class="kb-key" data-key="4">4</button></td>
                        <td><button type="button" class="kb-key" data-key="5">5</button></td>
                        <td><button type="button" class="kb-key" data-key="6">6</button></td>
                    </tr>
                    <tr>
                        <td><button type="button" class="kb-key" data-key="7">7</button></td>
                        <td><button type="button" class="kb-key" data-key="8">8</button></td>
                        <td><button type="button" class="kb-key" data-key="9">9</button></td>
                    </tr>
                    <tr>
                        <td><button type="button" id="keyboardDelete" class="kb-key key-delete" aria-label="Löschen">⌫</button></td>
                        <td><button type="button" class="kb-key" data-key="0">0</button></td>
                        <td><button type="button" id="keyboardOK" class="kb-key key-ok" aria-label="OK">✓</button></td>
                    </tr>
                </tbody>
                </table>
            </div>

            <div id="keyboardKeysAlpha" class="keyboard-keys-wrap keyboard-alpha-wrap hidden">
                <div class="kb-alpha-rows">
                    <div class="kb-row kb-row-1">
                    <button type="button" class="kb-key" data-key="Q">Q</button>
                    <button type="button" class="kb-key" data-key="W">W</button>
                    <button type="button" class="kb-key" data-key="E">E</button>
                    <button type="button" class="kb-key" data-key="R">R</button>
                    <button type="button" class="kb-key" data-key="T">T</button>
                    <button type="button" class="kb-key" data-key="Z">Z</button>
                    <button type="button" class="kb-key" data-key="U">U</button>
                    <button type="button" class="kb-key" data-key="I">I</button>
                    <button type="button" class="kb-key" data-key="O">O</button>
                    <button type="button" class="kb-key" data-key="P">P</button>
                    </div>
                    <div class="kb-row kb-row-2">
                    <button type="button" class="kb-key" data-key="A">A</button>
                    <button type="button" class="kb-key" data-key="S">S</button>
                    <button type="button" class="kb-key" data-key="D">D</button>
                    <button type="button" class="kb-key" data-key="F">F</button>
                    <button type="button" class="kb-key" data-key="G">G</button>
                    <button type="button" class="kb-key" data-key="H">H</button>
                    <button type="button" class="kb-key" data-key="J">J</button>
                    <button type="button" class="kb-key" data-key="K">K</button>
                    <button type="button" class="kb-key" data-key="L">L</button>
                    </div>
                    <div class="kb-row kb-row-3">
                    <button type="button" class="kb-key" data-key="Y">Y</button>
                    <button type="button" class="kb-key" data-key="X">X</button>
                    <button type="button" class="kb-key" data-key="C">C</button>
                    <button type="button" class="kb-key" data-key="V">V</button>
                    <button type="button" class="kb-key" data-key="B">B</button>
                    <button type="button" class="kb-key" data-key="N">N</button>
                    <button type="button" class="kb-key" data-key="M">M</button>
                    </div>
                </div>
                <table class="keyboard-grid keyboard-alpha-actions" role="presentation">
                <tbody>
                    <tr>
                        <td><button type="button" id="keyboardDeleteAlpha" class="kb-key key-delete" aria-label="Löschen">⌫</button></td>
                        <td><button type="button" class="kb-key key-space" data-key=" ">Leerz.</button></td>
                        <td><button type="button" id="keyboardOKAlpha" class="kb-key key-ok" aria-label="OK">✓</button></td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</div>

<script src="beschichtung_mobile.js?v=20260704besc19" defer></script>

</body>
</html>
