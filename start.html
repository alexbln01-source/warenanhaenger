<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Start</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#d8dee6">
<style>html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#f2f5f9 0%,#d8dee6 42%,#c3cad4 100%);}</style>
<link rel="stylesheet" href="shared_page_bg.css">
<script>
(function () {
    var params = new URLSearchParams(location.search);
    var bereich = params.get("bereich");
    if (!bereich) return;

    if (bereich === "home") {
        location.replace("index.html?fresh=" + Date.now());
        return;
    }

    var routes = {
        beschichtung: "beschichtung_mobile/beschichtung.html",
        kanten: "kanten_mobile/bearbeitung.html",
        schweissen: "baustelle.html",
        paus: "paus_mobile/paus_mobile.html"
    };

    var ziel = routes[bereich];
    if (!ziel) return;

    var qs = bereich === "beschichtung" ? "besc21=" : "v=";
    location.replace(ziel + "?" + qs + Date.now());
})();
</script>
</head>
<body>
</body>
</html>
