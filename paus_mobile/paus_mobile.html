<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PAUS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="paus_mobile.css?v=kb5">
<script defer src="paus_mobile.js?v=kb5"></script>

</head>

<body>

<div id="deviceInfo" class="device-info"></div>

<div class="page">

    <h1 class="title">PAUS Lieferung</h1>

    <input id="kommission" class="input-field" type="text" placeholder="Kommissionsnummer" autocomplete="off">
    <input id="lieferdatum" class="input-field" type="text" placeholder="TT.MM" autocomplete="off">

    <div class="color-row">
        <button class="color-btn" data-color="red">Rot</button>
        <button class="color-btn" data-color="blue">Blau</button>
        <button class="color-btn" data-color="black">Schwarz</button>
    </div>

    <button id="btnVorgezogen" class="vorgezogen-btn">Auftrag vorgezogen</button>

    <button id="openKeyboardBtn" class="keyboard-open-btn">Tastatur öffnen</button>

    <div id="keyboardPopup" class="keyboard-popup">
        <div class="keyboard-content">
            <div class="keyboard-header">
                <h3 id="keyboardTitle">Eingabe</h3>
                <button type="button" id="keyboardClose" class="keyboard-close-x" aria-label="Schließen">✕</button>
            </div>

            <input id="keyboardInput"
                   class="keyboard-input"
                   inputmode="none"
                   autocomplete="off"
                   autocorrect="off"
                   autocapitalize="off"
                   spellcheck="false">

            <div id="keyboardKeys" class="keyboard-keys-wrap">
                <table class="keyboard-grid" role="presentation">
                    <tbody>
                        <tr>
                            <td><button type="button" class="kb-key" data-key="1">1</button></td>
                            <td><button type="button" class="kb-key" data-key="2">2</button></td>
                            <td><button type="button" class="kb-key" data-key="3">3</button></td>
                        </tr>
                        <tr>
                            <td><button type="button" class="kb-key" data-key="4">4</button></td>
                            <td><button type="button" class="kb-key" data-key="5">5</button></td>
                            <td><button type="button" class="kb-key" data-key="6">6</button></td>
                        </tr>
                        <tr>
                            <td><button type="button" class="kb-key" data-key="7">7</button></td>
                            <td><button type="button" class="kb-key" data-key="8">8</button></td>
                            <td><button type="button" class="kb-key" data-key="9">9</button></td>
                        </tr>
                        <tr>
                            <td><button type="button" id="keyboardDelete" class="kb-key key-delete">Löschen</button></td>
                            <td><button type="button" class="kb-key" data-key="0">0</button></td>
                            <td><button type="button" id="keyboardOK" class="kb-key key-ok">OK</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="bottom-row">
        <button id="backBtn" class="back-btn">◀ Zurück</button>
        <button id="druckenBtn" class="primary-btn">🖨️ Drucken</button>
    </div>

    <div id="buildInfo" class="build-info"></div>

</div>

</body>
</html>
