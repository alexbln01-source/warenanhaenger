<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Druck – Kanten / Schweißen / Bohrwerk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* =======================
   BASIS
======================= */
html, body {
    margin: 0;
    padding: 0;
    background: #dcdcdc;
    font-family: Arial, sans-serif;
    height: 100%;
    overflow: hidden;
}

/* =======================
   VORSCHAU
======================= */
.preview-wrapper {
    width: 100%;
    height: calc(100% - 220px);
    display: flex;
    justify-content: center;
    align-items: center;
}

.preview-area {
    width: 148mm;
    height: 105mm;
    background: #fff;
    border: 1px solid #bbb;
    box-shadow: 0 0 12px rgba(0,0,0,0.35);
    transform-origin: center;
}

/* Vorschau-Skalierung (nur optisch!) */
@media (max-width: 900px) {
    .preview-area { transform: scale(0.55); }
}
@media (min-width: 901px) {
    .preview-area { transform: scale(0.7); }
}

/* =======================
   WARNBOX – DRUCKERHINWEIS
======================= */
.warnbox {
    margin: -10px auto 10px;
    max-width: 280px;
    background: #fff4f4;
    border: 2px solid #c80000;
    border-radius: 14px;
    padding: 12px 16px;
    text-align: center;
    font-weight: 900;
    color: #c80000;
    font-size: 16px;
    box-shadow: 0 0 10px rgba(200,0,0,0.2);
    animation: warnPulse 0.9s ease-in-out infinite;
}

.warnbox span {
    display: block;
    font-size: 14px;
    font-weight: 700;
    margin-top: 4px;
    color: #7a0000;
}

@keyframes warnPulse {
    0%   { box-shadow: 0 0 6px rgba(200,0,0,0.25); }
    50%  { box-shadow: 0 0 18px rgba(200,0,0,0.55); }
    100% { box-shadow: 0 0 6px rgba(200,0,0,0.25); }
}

/* Warnbox NICHT drucken */
@media print {
    .warnbox { display: none !important; }
}

/* =======================
   ETIKETT (A6 QUER)
======================= */
.etikett {
    width: 148mm;
    height: 105mm;
    padding: 8mm;
    box-sizing: border-box;
}

.etikett-center {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.etikett-center div {
    width: 100%;
    font-weight: bold;
}

.etikett-center.bergmann-kanten {
    justify-content: flex-start;
    padding-top: 6mm;
}

/* =======================
   BUTTONS
======================= */
.bottom-bar {
    height: 70px;
    display: flex;
    gap: 16px;
    padding: 10px 18px;
}

.btn {
    flex: 1;
    border: none;
    border-radius: 14px;
    font-size: 20px;
    font-weight: bold;
    color: white;
}

.back-btn  { background:#444; }
.print-btn { background:#15803d; }

.post-print-bar {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100000;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.post-print-bar.show {
    display: flex;
}

.home-btn {
    width: auto;
    min-width: 280px;
    padding: 18px 28px;
    background: #15803d;
    font-size: 22px;
}

/* =======================
   PRINT (A6 HOCH – INHALT GEDREHT)
======================= */
.print-only { display: none; }

@media print {

    html, body {
        overflow: visible !important;
        height: auto !important;
        width: auto !important;
    }

    body { background: white !important; }

    .preview-wrapper,
    .bottom-bar,
    .warnbox,
    .post-print-bar {
        display: none !important;
    }

    .print-only {
        display: block !important;
    }

    @page {
        size: A6 portrait;
        margin: 0;
    }

    #printArea {
        display: block !important;
        overflow: visible !important;
        height: auto !important;
    }

    .print-page {
        display: block !important;
        width: 105mm;
        height: 148mm;
        min-height: 148mm;
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
        page-break-after: always;
        break-after: page;
        page-break-inside: avoid;
        break-inside: avoid;
    }

    .print-page:last-child {
        page-break-after: auto;
        break-after: auto;
    }

    .print-page .etikett {
        width: 148mm;
        height: 105mm;
        padding: 8mm;
        box-sizing: border-box;
        position: absolute;
        top: 21.5mm;
        left: -21.5mm;
        transform: rotate(-90deg);
        transform-origin: center;
    }
}
</style>
</head>

<body>

<!-- ===== VORSCHAU ===== -->
<div class="preview-wrapper">
    <div class="preview-area">
        <div class="etikett">
            <div class="etikett-center" id="previewContent"></div>
        </div>
    </div>
</div>

<div class="warnbox">
    ⚠️ Achtung!<br>
    (<b>A6 Hochformat</b><br>
</div>

<!-- ===== DRUCK ===== -->
<div id="printArea" class="print-only"></div>

<!-- ===== BUTTONS ===== -->
<div class="bottom-bar">
    <button class="btn back-btn" id="backBtn">◀ Zurück</button>
    <button class="btn print-btn" id="printBtn">Drucken</button>
</div>

<div id="postPrintBar" class="post-print-bar">
    <button id="homeBtn" class="btn home-btn">✓ Zur Startseite</button>
</div>

<script>
const qs    = new URLSearchParams(location.search);
const kunde = qs.get("kunde") || "Sonstige Kunden";
const art   = qs.get("art")   || "kanten";

/* ===== DOM REFERENZEN ===== */
const previewContent = document.getElementById("previewContent");
const printArea      = document.getElementById("printArea");
const printBtn       = document.getElementById("printBtn");
const backBtn        = document.getElementById("backBtn");
const postPrintBar   = document.getElementById("postPrintBar");
const homeBtn        = document.getElementById("homeBtn");
const isEiltSehr = (kunde === "EILT_SEHR");

/* Bergmann M-H + Kanten: 50 Etikette mit Palettennummer 700–749 */
const BERGMANN_KANTEN_PALETTE_START = 700;
const BERGMANN_KANTEN_PALETTE_COUNT = 50;
const isBergmannKantenBatch =
    kunde === "Bergmann M-H" && art === "kanten";

/* =================================================
   SONDERFALL: EILT SEHR
================================================= */
if (isEiltSehr) {
    const html = `
        <div style="
            width:100%;
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:70pt;
            font-weight:900;
            color:#c80000;
            text-align:center;">
            EILT&nbsp;SEHR
        </div>`;
    previewContent.innerHTML = html;
    printArea.innerHTML = `
        <div class="print-page">
            <div class="etikett">
                <div class="etikett-center">${html}</div>
            </div>
        </div>`;
}


/* ================== BOHRWERK PARAMETER ================== */
const BW_KUNDE_SIZE = "50pt";

const BW_TEXT_SIZE  = "25mm";

/* ================== KANTEN ================== */

],

],

 { text:"<kunde>", size:"38pt", marginTop:"0mm", align:"center" },

 { text:"K-Termin: _____________________", size:"22pt", marginTop:"14mm", align:"left" },

],

],

],

 { text:"K-Termin: _____________________", size:"22pt", marginTop:"14mm", align:"left" },

],

 { text:"Kanten", size:"38pt", marginTop:"8mm", align:"center" },
 { text:"K-Termin: _____________________", size:"22pt", marginTop:"14mm", align:"left" }
],

 { text:"<kunde>", size:"38pt", marginTop:"0mm", align:"center" },

],

 { text:"<kunde>", size:"38pt", marginTop:"0mm", align:"center" },
 { text:"Kanten", size:"38pt", marginTop:"8mm", align:"center" },
 { text:"K-Termin: _____________________", size:"22pt", marginTop:"14mm", align:"left" },
 { text:"Palettennummer: _______________", size:"22pt", marginTop:"22mm", align:"left" }
]
};

/* ================== SCHWEISSEN ================== */
const schweissenLayouts = {

 { text:"<kunde>", size:"38pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"18pt", marginTop:"8mm", align:"center" },

],

],

],

],

],

],

],

],

],

]

/* ================== BOHRWERK ================== */
const bohrwerkLayouts = {
"Sonstige Kunden":[
 { text:"<kunde>", size:BW_KUNDE_SIZE, marginTop:"0mm", align:"center" },
 { text:"BW", size:BW_TEXT_SIZE, marginTop:BW_ABSTAND, align:"center", circle:true }
]
};

function render(rows, paletteNum){
    const paletteDisplay =
        paletteNum != null ? String(paletteNum) : "_______________";

    return rows.map(r=>{
        if(r.circle){
            return `<div style="margin:${r.marginTop} auto 0;width:${BW_KREIS_SIZE};height:${BW_KREIS_SIZE};border:4px solid black;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${r.size};">${r.text}</div>`;
        }
        if (r.inlinePalette) {
            const num = paletteNum != null ? String(paletteNum) : "_______________";
            return `<div style="font-size:${r.size};margin-top:${r.marginTop};text-align:${r.align};white-space:nowrap;">Palettennummer:&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-size:${r.paletteSize};font-weight:900;">${num}</span></div>`;
        }
        if (r.text === "<palette>") {
            const num = paletteNum != null ? String(paletteNum) : "—";
            return `<div style="font-size:${r.size};margin-top:${r.marginTop};text-align:${r.align};font-weight:900;line-height:1;">${num}</div>`;
        }
        const text = r.text
            .replace("<kunde>", kunde)
            .replace("<palette>", paletteDisplay);
        return `<div style="font-size:${r.size};margin-top:${r.marginTop};text-align:${r.align};">${text}</div>`;
    }).join("");
}

function buildPrintPages(rows, paletteNumbers, bergmannKanten){
    printArea.innerHTML = paletteNumbers.map(num => `
        <div class="print-page">
            <div class="etikett">
                <div class="etikett-center${bergmannKanten ? " bergmann-kanten" : ""}">${render(rows, num)}</div>
            </div>
        </div>
    `).join("");
}

let layouts = kantenLayouts;
if(art==="schweissen") layouts = schweissenLayouts;
if(art==="bohrwerk") layouts = bohrwerkLayouts;

if (!isEiltSehr) {
    const rows = layouts[kunde] || layouts["Sonstige Kunden"];

    if (isBergmannKantenBatch) {
        const paletteEnd =
            BERGMANN_KANTEN_PALETTE_START + BERGMANN_KANTEN_PALETTE_COUNT - 1;

        previewContent.className = "etikett-center bergmann-kanten";
        previewContent.innerHTML = render(rows, BERGMANN_KANTEN_PALETTE_START);

        const paletteNumbers = Array.from(
            { length: BERGMANN_KANTEN_PALETTE_COUNT },
            (_, i) => BERGMANN_KANTEN_PALETTE_START + i
        );
        buildPrintPages(rows, paletteNumbers, true);

        printBtn.textContent =
            `Drucken (${BERGMANN_KANTEN_PALETTE_COUNT}× ${BERGMANN_KANTEN_PALETTE_START}–${paletteEnd})`;
    } else {
        previewContent.className = "etikett-center";
        previewContent.innerHTML = render(rows);
        buildPrintPages(rows, [null], false);
    }
}
/* ===== PRINT + RETURN ===== */

const ua  = navigator.userAgent.toLowerCase();
const sw  = window.screen.width;
const sh  = window.screen.height;
const dpr = window.devicePixelRatio;
const isTC22  = ua.includes("android") && sw === 360 && sh === 720 && dpr === 3;
const isTC21  = ua.includes("android") && sw === 360 && sh === 640;
const isZebra = isTC22 || isTC21 || ua.includes("zebra");
const isMobileDevice = /android|iphone|ipad|ipod/i.test(navigator.userAgent);

let didPrint = false;
let returnFallback = null;
let printStartedAt = 0;

function goHome() {
    clearTimeout(returnFallback);
    returnFallback = null;
    postPrintBar.classList.remove("show");
    window.location.replace("../index.html");
}

function finishPrintAndGoHome() {
    if (!didPrint) return;
    didPrint = false;
    goHome();
}

function showPostPrintUi() {
    if (!didPrint) return;
    postPrintBar.classList.add("show");
    clearTimeout(returnFallback);
    returnFallback = setTimeout(finishPrintAndGoHome, 2500);
}

function onPrintDialogClosed() {
    if (!didPrint) return;
    if (Date.now() - printStartedAt < 500) return;
    showPostPrintUi();
}

function armReturnFallback(ms) {
    clearTimeout(returnFallback);
    returnFallback = setTimeout(showPostPrintUi, ms);
}

function setupPrintReturnHandlers() {
    window.addEventListener("afterprint", onPrintDialogClosed);

    const printMq = window.matchMedia("print");
    const onPrintMediaChange = (e) => {
        if (!e.matches && didPrint && Date.now() - printStartedAt > 500) {
            onPrintDialogClosed();
        }
    };
    if (printMq.addEventListener) printMq.addEventListener("change", onPrintMediaChange);
    else if (printMq.addListener) printMq.addListener(onPrintMediaChange);

    document.addEventListener("visibilitychange", () => {
        if (!didPrint || document.visibilityState !== "visible") return;
        if (Date.now() - printStartedAt < 500) return;
        onPrintDialogClosed();
    });

    window.addEventListener("focus", () => {
        if (!didPrint || Date.now() - printStartedAt < 500) return;
        setTimeout(onPrintDialogClosed, 300);
    });

    homeBtn.onclick = finishPrintAndGoHome;
}

setupPrintReturnHandlers();

/* >>> DRUCKEN <<< */
printBtn.onclick = () => {
    didPrint = true;
    printStartedAt = Date.now();
    postPrintBar.classList.remove("show");

    window.print();
    armReturnFallback(isZebra || isMobileDevice ? 4000 : 6000);
};

/* >>> ZURÜCK BUTTON <<< */
backBtn.onclick = () => {
    window.location.replace("kanten_mobile.html");
};
</script>
