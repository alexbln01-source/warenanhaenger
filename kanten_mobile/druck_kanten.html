<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Druck – Kanten / Schweißen / Bohrwerk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* =======================
   BASIS
======================= */
html, body {
    margin: 0;
    padding: 0;
    background: #dcdcdc;
    font-family: Arial, sans-serif;
    height: 100%;
    overflow: hidden;
}

/* =======================
   VORSCHAU
======================= */
.preview-wrapper {
    width: 100%;
    height: calc(100% - 220px);
    display: flex;
    justify-content: center;
    align-items: center;
}

.preview-area {
    width: 148mm;
    height: 105mm;
    background: #fff;
    border: 1px solid #bbb;
    box-shadow: 0 0 12px rgba(0,0,0,0.35);
    transform-origin: center;
}

/* Vorschau-Skalierung (nur optisch!) */
@media (max-width: 900px) {
    .preview-area { transform: scale(0.55); }
}
@media (min-width: 901px) {
    .preview-area { transform: scale(0.7); }
}

/* =======================
   WARNBOX – DRUCKERHINWEIS
======================= */
.warnbox {
    margin: -10px auto 10px;
    max-width: 280px;
    background: #fff4f4;
    border: 2px solid #c80000;
    border-radius: 14px;
    padding: 12px 16px;
    text-align: center;
    font-weight: 900;
    color: #c80000;
    font-size: 16px;
    box-shadow: 0 0 10px rgba(200,0,0,0.2);
    animation: warnPulse 0.9s ease-in-out infinite;
}

.warnbox span {
    display: block;
    font-size: 14px;
    font-weight: 700;
    margin-top: 4px;
    color: #7a0000;
}

@keyframes warnPulse {
    0%   { box-shadow: 0 0 6px rgba(200,0,0,0.25); }
    50%  { box-shadow: 0 0 18px rgba(200,0,0,0.55); }
    100% { box-shadow: 0 0 6px rgba(200,0,0,0.25); }
}

/* Warnbox NICHT drucken */
@media print {
    .warnbox { display: none !important; }
}

/* =======================
   ETIKETT (A6 QUER)
======================= */
.etikett {
    width: 148mm;
    height: 105mm;
    padding: 8mm;
    box-sizing: border-box;
}

.etikett-center {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.etikett-center div {
    width: 100%;
    font-weight: bold;
}

.etikett-center.batch-kanten {
    justify-content: flex-start;
    padding-top: 2mm;
    padding-bottom: 5mm;
}

.etikett.batch-etikett {
    padding: 5mm 8mm 7mm 8mm;
}

/* =======================
   BUTTONS
======================= */
.bottom-bar {
    height: 70px;
    display: flex;
    gap: 16px;
    padding: 10px 18px;
}

.btn {
    flex: 1;
    border: none;
    border-radius: 14px;
    font-size: 20px;
    font-weight: bold;
    color: white;
}

.back-btn  { background:#444; }
.print-btn { background:#15803d; }

/* =======================
   PRINT (A6 HOCH – INHALT GEDREHT)
======================= */
.print-only { display: none; }

@media print {

    html, body {
        overflow: visible !important;
        height: auto !important;
        width: auto !important;
    }

    body { background: white !important; }

    .preview-wrapper,
    .bottom-bar,
    .warnbox {
        display: none !important;
    }

    .print-only {
        display: block !important;
    }

    @page {
        size: A6 portrait;
        margin: 0;
    }

    #printArea {
        display: block !important;
        overflow: visible !important;
        height: auto !important;
    }

    .print-page {
        display: block !important;
        width: 105mm;
        height: 148mm;
        min-height: 148mm;
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
        page-break-after: always;
        break-after: page;
        page-break-inside: avoid;
        break-inside: avoid;
    }

    .print-page:last-child {
        page-break-after: auto;
        break-after: auto;
    }

    .print-page .etikett {
        width: 148mm;
        height: 105mm;
        padding: 8mm;
        box-sizing: border-box;
        position: absolute;
        top: 21.5mm;
        left: -21.5mm;
        transform: rotate(-90deg);
        transform-origin: center;
    }

    .print-page .etikett.batch-etikett {
        top: 16mm;
        padding: 4mm 8mm 8mm 8mm;
    }
}
</style>
</head>

<body>

<!-- ===== VORSCHAU ===== -->
<div class="preview-wrapper">
    <div class="preview-area">
        <div class="etikett">
            <div class="etikett-center" id="previewContent"></div>
        </div>
    </div>
</div>

<div class="warnbox">
    ⚠️ Achtung!<br>
    (<b>A6 Hochformat</b><br>
</div>

<!-- ===== DRUCK ===== -->
<div id="printArea" class="print-only"></div>

<!-- ===== BUTTONS ===== -->
<div class="bottom-bar">
    <button class="btn back-btn" id="backBtn">◀ Zurück</button>
    <button class="btn print-btn" id="printBtn">Drucken</button>
</div>

<script>
const qs    = new URLSearchParams(location.search);
const kunde = qs.get("kunde") || "Sonstige";
const art   = qs.get("art")   || "kanten";

/* ===== DOM REFERENZEN ===== */
const previewContent = document.getElementById("previewContent");
const printArea      = document.getElementById("printArea");
const printBtn       = document.getElementById("printBtn");
const backBtn        = document.getElementById("backBtn");
const isEiltSehr = (kunde === "EILT_SEHR");

const kundeAliases = {
    "L.Bergmann": "L. Bergmann",
    "Sonstige Kunden": "Sonstige"
};
const layoutKunde = kundeAliases[kunde] || kunde;

/* Kanten-Sonderdruck: nummerierte Paletten-Batches */
const kantenBatchConfigs = {
    "Backhus":      { start: 400, end: 450 },
    "Bergmann M-H": { start: 700, end: 750 },
    "Bücker":       { start: 300, end: 350 },
    "FVG":          { start: 1, end: 50, pad: 2 },
    "Janzen":       { start: 900, end: 950 },
    "Krone Spelle": { start: 100, end: 150 },
    "L. Bergmann":  { start: 600, end: 650 },
    "Sonstige":     { start: 1000, end: 1050 },
    "Böckmann":     { start: 200, end: 250 }
};
const kantenBatch = art === "kanten" ? kantenBatchConfigs[layoutKunde] : null;
const isKantenBatch = !!kantenBatch;

/* =================================================
   SONDERFALL: EILT SEHR
================================================= */
if (isEiltSehr) {
    const html = `
        <div style="
            width:100%;
            height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:70pt;
            font-weight:900;
            color:#c80000;
            text-align:center;">
            EILT&nbsp;SEHR
        </div>`;
    previewContent.innerHTML = html;
    printArea.innerHTML = `
        <div class="print-page">
            <div class="etikett">
                <div class="etikett-center">${html}</div>
            </div>
        </div>`;
}


/* ================== BOHRWERK PARAMETER ================== */
const BW_KUNDE_SIZE = "50pt";
const BW_KREIS_SIZE = "50mm";
const BW_TEXT_SIZE  = "25mm";
const BW_ABSTAND    = "12mm";

/* ================== KANTEN ================== */
const kantenBatchLayout = [
 { text:"<kunde>", size:"38pt", marginTop:"0mm", align:"center" },
 { text:"Kanten", size:"38pt", marginTop:"6mm", align:"center" },
 { text:"K-Termin: _____________________", size:"22pt", marginTop:"14mm", align:"left" },
 { text:"Palettennummer: <palette>", size:"22pt", paletteSize:"52pt", marginTop:"14mm", align:"left", inlinePalette:true }
];

const kantenLayouts = {
"Backhus": kantenBatchLayout,
"Bergmann M-H": kantenBatchLayout,
"Bücker": kantenBatchLayout,
"FVG": kantenBatchLayout,
"Grimme":[
 { text:"<kunde>", size:"38pt", marginTop:"0mm", align:"center" },
 { text:"Kanten", size:"38pt", marginTop:"8mm", align:"center" },
 { text:"K-Termin: _____________________", size:"22pt", marginTop:"14mm", align:"left" },
 { text:"Palettennummer: _______________", size:"22pt", marginTop:"22mm", align:"left" }
],
"Janzen": kantenBatchLayout,
"Krone Spelle": kantenBatchLayout,
"L. Bergmann": kantenBatchLayout,
"PAUS":[
 { text:"<kunde>", size:"38pt", marginTop:"0mm", align:"center" },
 { text:"Kanten", size:"38pt", marginTop:"8mm", align:"center" },
 { text:"K-Termin: _____________________", size:"22pt", marginTop:"14mm", align:"left" }
],
"Böckmann": kantenBatchLayout,
"Sonstige": kantenBatchLayout
};

/* ================== SCHWEISSEN ================== */
const schweissenLayouts = {
"Bergmann M-H":[
 { text:"<kunde>", size:"38pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"18pt", marginTop:"8mm", align:"center" },
 { text:"Auftr. Nr: __________________________", size:"18pt", marginTop:"12mm", align:"left" },
 { text:"Pos. Nr: ___________________________", size:"18pt", marginTop:"12mm", align:"left" },
 { text:"SW-Termin: ________________________", size:"18pt", marginTop:"12mm", align:"left" }
],
"Backhus":[
 { text:"<kunde>", size:"36pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"32pt", marginTop:"8mm", align:"center" },
 { text:"SW-Termin: _____________________", size:"22pt", marginTop:"16mm", align:"left" }
],
"Bücker":[
 { text:"<kunde>", size:"36pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"32pt", marginTop:"8mm", align:"center" },
 { text:"SW-Termin: ___________________", size:"22pt", marginTop:"16mm", align:"left" }
],
"FVG":[
 { text:"<kunde>", size:"36pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"32pt", marginTop:"8mm", align:"center" },
 { text:"SW-Termin: ___________________", size:"22pt", marginTop:"16mm", align:"left" }
],
"Grimme":[
 { text:"<kunde>", size:"36pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"32pt", marginTop:"8mm", align:"center" },
 { text:"SW-Termin: ___________________", size:"22pt", marginTop:"16mm", align:"left" }
],
"Janzen":[
 { text:"<kunde>", size:"36pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"32pt", marginTop:"8mm", align:"center" },
 { text:"SW-Termin: ___________________", size:"22pt", marginTop:"16mm", align:"left" }
],
"Krone Spelle":[
 { text:"<kunde>", size:"38pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"18pt", marginTop:"0mm", align:"center" },
 { text:"Auftr--Nr: __________________________", size:"18pt", marginTop:"6mm", align:"left" },
 { text:"Bezeichnung: ________________________", size:"18pt", marginTop:"12mm", align:"left" },
 { text:"Stückzahl: __________________________", size:"18pt", marginTop:"12mm", align:"left" },
 { text:"SW-Termin: __________________________", size:"18pt", marginTop:"12mm", align:"left" }
],
"L. Bergmann":[
 { text:"<kunde>", size:"36pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"32pt", marginTop:"8mm", align:"center" },
 { text:"SW-Termin: ___________________", size:"22pt", marginTop:"16mm", align:"left" }
],
"PAUS":[
 { text:"<kunde>", size:"36pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"32pt", marginTop:"8mm", align:"center" },
 { text:"SW-Termin: ___________________", size:"22pt", marginTop:"16mm", align:"left" }
],
"Böckmann":[
 { text:"<kunde>", size:"36pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"32pt", marginTop:"8mm", align:"center" },
 { text:"SW-Termin: ____________________", size:"22pt", marginTop:"16mm", align:"left" }
],
"Sonstige":[
 { text:"<kunde>", size:"36pt", marginTop:"0mm", align:"center" },
 { text:"Schweißen", size:"32pt", marginTop:"8mm", align:"center" },
 { text:"SW-Termin: ___________________", size:"22pt", marginTop:"16mm", align:"left" }
]
};

/* ================== BOHRWERK ================== */
const bohrwerkLayouts = {
"Sonstige":[
 { text:"<kunde>", size:BW_KUNDE_SIZE, marginTop:"0mm", align:"center" },
 { text:"BW", size:BW_TEXT_SIZE, marginTop:BW_ABSTAND, align:"center", circle:true }
]
};

function render(rows, paletteNum){
    const paletteDisplay =
        paletteNum != null ? String(paletteNum) : "_______________";

    return rows.map(r=>{
        if(r.circle){
            return `<div style="margin:${r.marginTop} auto 0;width:${BW_KREIS_SIZE};height:${BW_KREIS_SIZE};border:4px solid black;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${r.size};">${r.text}</div>`;
        }
        if (r.inlinePalette) {
            const num = paletteNum != null ? String(paletteNum) : "_______________";
            return `<div style="font-size:${r.size};margin-top:${r.marginTop};text-align:${r.align};white-space:nowrap;line-height:1.1;">Palettennummer:&nbsp;&nbsp;&nbsp;&nbsp;<span style="font-size:${r.paletteSize};font-weight:900;line-height:1;">${num}</span></div>`;
        }
        if (r.text === "<palette>") {
            const num = paletteNum != null ? String(paletteNum) : "—";
            return `<div style="font-size:${r.size};margin-top:${r.marginTop};text-align:${r.align};font-weight:900;line-height:1;">${num}</div>`;
        }
        const text = r.text
            .replace("<kunde>", kunde)
            .replace("<palette>", paletteDisplay);
        return `<div style="font-size:${r.size};margin-top:${r.marginTop};text-align:${r.align};">${text}</div>`;
    }).join("");
}

function formatPaletteNum(num, pad) {
    return pad ? String(num).padStart(pad, "0") : num;
}

function buildPaletteNumbers(batch) {
    const { start, end, pad } = batch;
    const count = end - start + 1;
    return Array.from({ length: count }, (_, i) => formatPaletteNum(start + i, pad));
}

function batchButtonLabel(batch) {
    const start = formatPaletteNum(batch.start, batch.pad);
    const end = formatPaletteNum(batch.end, batch.pad);
    return `Drucken (${start}–${end})`;
}

function buildPrintPages(rows, paletteNumbers, batchKanten){
    printArea.innerHTML = paletteNumbers.map(num => `
        <div class="print-page">
            <div class="etikett${batchKanten ? " batch-etikett" : ""}">
                <div class="etikett-center${batchKanten ? " batch-kanten" : ""}">${render(rows, num)}</div>
            </div>
        </div>
    `).join("");
}

let layouts = kantenLayouts;
if(art==="schweissen") layouts = schweissenLayouts;
if(art==="bohrwerk") layouts = bohrwerkLayouts;

if (!isEiltSehr) {
    const rows = layouts[layoutKunde] || layouts["Sonstige"];

    if (isKantenBatch) {
        const paletteNumbers = buildPaletteNumbers(kantenBatch);

        previewContent.className = "etikett-center batch-kanten";
        previewContent.innerHTML = render(rows, paletteNumbers[0]);
        previewContent.parentElement.classList.add("batch-etikett");

        buildPrintPages(rows, paletteNumbers, true);

        printBtn.textContent = batchButtonLabel(kantenBatch);
    } else {
        previewContent.className = "etikett-center";
        previewContent.innerHTML = render(rows);
        buildPrintPages(rows, [null], false);
    }
}
/* ===== PRINT + RETURN ===== */

const ua  = navigator.userAgent.toLowerCase();
const sw  = window.screen.width;
const sh  = window.screen.height;
const dpr = window.devicePixelRatio;
const isTC22  = ua.includes("android") && sw === 360 && sh === 720 && dpr === 3;
const isTC21  = ua.includes("android") && sw === 360 && sh === 640;
const isZebra = isTC22 || isTC21 || ua.includes("zebra");
const isEdge  = ua.includes("edg/") || ua.includes("edge/");
const isMobileDevice = /android|iphone|ipad|ipod/i.test(navigator.userAgent);

let didPrint = false;
let goingHome = false;
let returnFallback = null;
let goHomeTimer = null;
let printStartedAt = 0;

const printCloseDelayMs = isKantenBatch ? 800 : 500;
const fallbackDelayMs = isKantenBatch
    ? (isZebra ? 30000 : (isMobileDevice || isEdge ? 20000 : 12000))
    : (isZebra || isMobileDevice || isEdge ? 8000 : 10000);

function goHome() {
    if (goingHome) return;
    goingHome = true;
    didPrint = false;

    clearTimeout(returnFallback);
    clearTimeout(goHomeTimer);
    returnFallback = null;
    goHomeTimer = null;

    window.location.replace("../start.html?bereich=home");
}

function scheduleGoHome() {
    if (!didPrint || goingHome) return;
    clearTimeout(goHomeTimer);
    goHomeTimer = setTimeout(goHome, 300);
}

function onPrintDialogClosed() {
    if (!didPrint || goingHome) return;
    if (Date.now() - printStartedAt < printCloseDelayMs) return;

    clearTimeout(returnFallback);
    returnFallback = null;
    scheduleGoHome();
}

function armReturnFallback(ms) {
    clearTimeout(returnFallback);
    returnFallback = setTimeout(onPrintDialogClosed, ms);
}

function setupPrintReturnHandlers() {
    window.addEventListener("afterprint", onPrintDialogClosed);

    const printMq = window.matchMedia("print");
    const onPrintMediaChange = (e) => {
        if (!e.matches && didPrint && Date.now() - printStartedAt > printCloseDelayMs) {
            onPrintDialogClosed();
        }
    };
    if (printMq.addEventListener) printMq.addEventListener("change", onPrintMediaChange);
    else if (printMq.addListener) printMq.addListener(onPrintMediaChange);

    document.addEventListener("visibilitychange", () => {
        if (!didPrint || goingHome || document.visibilityState !== "visible") return;
        if (Date.now() - printStartedAt < printCloseDelayMs) return;
        onPrintDialogClosed();
    });

    window.addEventListener("focus", () => {
        if (!didPrint || goingHome || Date.now() - printStartedAt < printCloseDelayMs) return;
        setTimeout(onPrintDialogClosed, 300);
    });
}

setupPrintReturnHandlers();

/* >>> DRUCKEN <<< */
printBtn.onclick = () => {
    goingHome = false;
    didPrint = true;
    printStartedAt = Date.now();

    window.print();
    armReturnFallback(fallbackDelayMs);
};

/* >>> ZURÜCK BUTTON <<< */
backBtn.onclick = () => {
    window.location.replace("kanten_mobile.html");
};
</script>

</body>
</html>
