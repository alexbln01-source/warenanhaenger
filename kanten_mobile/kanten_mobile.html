<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#d8dee6">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Kanten</title>
<link rel="stylesheet" href="kanten_mobile.css?v=langen8">
</head>
<body>

<div id="deviceInfo" class="device-info"></div>

<div id="card">

    <h1 class="title">Kanten</h1>

    <p class="section-label">Art wählen</p>
    <div class="art-grid">
        <button type="button" id="btnKanten" class="artBtn">Kanten</button>
        <button type="button" id="btnSchweissen" class="artBtn">Schweißen</button>
        <button type="button" id="btnBohrwerk" class="artBtn">Bohrwerk</button>
        <button type="button" id="btnEiltSehr" class="artBtn art-eilt">Eilt sehr</button>
    </div>

    <p class="section-label">Kunde wählen</p>
    <div id="kundenArea" class="kunden-grid disabled">
        <button type="button" class="kundeBtn" data-kunde="Backhus">Backhus</button>
        <button type="button" class="kundeBtn" data-kunde="Bergmann M-H">Bergmann Meppen Hüntel</button>
        <button type="button" class="kundeBtn" data-kunde="Böckmann">Böckmann</button>
        <button type="button" class="kundeBtn" data-kunde="Bücker">Bücker</button>
        <button type="button" class="kundeBtn" data-kunde="FVG">FVG</button>
        <button type="button" class="kundeBtn" data-kunde="Grimme">Grimme</button>
        <button type="button" class="kundeBtn" data-kunde="Janzen">Janzen</button>
        <button type="button" class="kundeBtn" data-kunde="Krone Spelle">Krone Spelle</button>
        <button type="button" class="kundeBtn" data-kunde="L.Bergmann">L.Bergmann</button>
        <button type="button" class="kundeBtn" data-kunde="PAUS">PAUS</button>
        <button type="button" class="kundeBtn" data-kunde="Sonstige">Sonstige</button>
    </div>

    <div id="actionButtons">
        <button type="button" id="btnBack">◀ Zurück</button>
        <button type="button" id="btnDrucken" disabled>🖨️ Drucken</button>
    </div>

</div>

<div id="buildInfo" class="build-info"></div>

<script src="kanten_mobile.js?v=langen8"></script>

</body>
</html>
