<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#003a73">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Bearbeitung</title>
<script>
(function () {
    var v = Date.now();
    document.write('<link rel="stylesheet" href="kanten_mobile.css?v=' + v + '">');
})();
</script>
<style>
.page-title {
    margin: 0;
    font-size: 32px;
    font-weight: 900;
    color: #003a73;
    text-align: center;
    letter-spacing: -0.5px;
}
</style>
</head>
<body data-page="bearbeitung" data-ver="bearb7">

<div id="deviceInfo" class="device-info"></div>
<p id="buildInfo" class="build-info" x-apple-data-detectors="false"></p>

<div id="card">

    <h1 class="page-title" id="pageTitle">Bearbeitung</h1>
    <p class="page-sub">Warenanhänger · A6</p>

    <div class="work-area">
        <div class="art-section">
            <p class="section-head">Tätigkeit wählen</p>
            <div class="art-grid">
                <button type="button" id="btnKanten" class="artBtn">Kanten</button>
                <button type="button" id="btnSchweissen" class="artBtn">Schweißen</button>
                <button type="button" id="btnBohrwerk" class="artBtn">Bohrwerk</button>
                <button type="button" id="btnEiltSehr" class="artBtn art-eilt">Eilt sehr</button>
            </div>
        </div>

        <div class="kunden-wrap">
            <p class="section-head">Kunde wählen</p>
            <div id="kundenHint" class="kunden-hint">
                <p class="hint-title">Noch kein Kunde</p>
                <p class="hint-text">Bitte zuerst eine Tätigkeit auswählen</p>
            </div>

            <div id="kundenReady" class="kunden-ready hidden">
                <div class="ready-icon">✓</div>
                <p class="ready-title">Eilt sehr</p>
                <p class="ready-text">Bereit zum Drucken</p>
            </div>

            <div id="kundenArea" class="kunden-grid hidden">
                <button type="button" class="kundeBtn" data-kunde="Backhus">Backhus</button>
                <button type="button" class="kundeBtn" data-kunde="Bergmann M-H">Bergmann Meppen Hüntel</button>
                <button type="button" class="kundeBtn" data-kunde="Böckmann">Böckmann</button>
                <button type="button" class="kundeBtn" data-kunde="Bücker">Bücker</button>
                <button type="button" class="kundeBtn" data-kunde="FVG">FVG</button>
                <button type="button" class="kundeBtn" data-kunde="Grimme">Grimme</button>
                <button type="button" class="kundeBtn" data-kunde="Janzen">Janzen</button>
                <button type="button" class="kundeBtn" data-kunde="Krone Spelle">Krone Spelle</button>
                <button type="button" class="kundeBtn" data-kunde="L.Bergmann">L.Bergmann</button>
                <button type="button" class="kundeBtn" data-kunde="PAUS">PAUS</button>
                <button type="button" class="kundeBtn" data-kunde="Sonstige">Sonstige</button>
            </div>
        </div>
    </div>

    <div id="actionButtons">
        <button type="button" id="btnBack">◀ Zurück</button>
        <button type="button" id="btnDrucken" disabled>Drucken</button>
    </div>

</div>

<script>
(function () {
    var v = Date.now();
    document.write('<script src="kanten_mobile.js?v=' + v + '"><\/script>');
})();
</script>

</body>
</html>
